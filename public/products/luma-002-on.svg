<svg xmlns="http://www.w3.org/2000/svg" width="900" height="900" viewBox="0 0 800 800" role="img" aria-labelledby="title">
  <title id="title">Nora Opal Globe Pendant on</title>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0" stop-color="#e1d9b8"/><stop offset=".55" stop-color="#111216"/><stop offset="1" stop-color="#272018"/></radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="28"/></filter>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="16" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0 .05"/></feComponentTransfer></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <rect width="800" height="800" fill="#000" opacity=".14"/>
  <ellipse cx="400" cy="690" rx="265" ry="58" fill="#191515" opacity=".5"/>
  <line x1="400" y1="80" x2="400" y2="225" stroke="#b5b5af" stroke-width="10"/><ellipse cx="400" cy="252" rx="54" ry="16" fill="#b5b5af"/><ellipse cx="400" cy="500" rx="210" ry="85" fill="#fff7d6" opacity=".24" filter="url(#blur)"/><circle cx="400" cy="360" r="118" fill="#fff7d6" opacity=".82" filter="url(#softGlow)"/><circle cx="365" cy="325" r="34" fill="#fff" opacity=".22"/>
  <rect width="800" height="800" filter="url(#grain)" opacity=".65"/>
</svg>
