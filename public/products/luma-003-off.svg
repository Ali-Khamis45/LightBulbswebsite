  <rect width="800" height="800" fill="url(#bg)"/>
  <rect width="800" height="800" fill="#000" opacity="0"/>
  <ellipse cx="400" cy="690" rx="265" ry="58" fill="#ded2c0" opacity=".95"/>
  <ellipse cx="400" cy="650" rx="120" ry="24" fill="#784820"/><rect x="390" y="300" width="20" height="345" rx="10" fill="#9b6b43"/><path d="M295 235 L505 235 L470 345 Q400 380 330 345 Z" fill="#9b6b43"/><path d="M330 250 L470 250 L448 330 Q400 352 352 330 Z" fill="#e8ddcc" opacity=".55"/><circle cx="400" cy="360" r="42" fill="#d8d4cb" />
  <rect width="800" height="800" filter="url(#grain)" opacity=".35"/>
</svg>
